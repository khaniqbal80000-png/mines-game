<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mines History | Mines Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.85);
            --text-light: #f5f5f5;
            --success: #4caf50;
            --pending: #ff9800;
        }
        body {
            font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: var(--text-light);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 20px; }
        nav a { color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 5px; transition: 0.3s; }
        nav a:hover { background: var(--gold); color: #000; }
        
        .history-container {
            background: var(--panel-bg); border: 1px solid #333; border-radius: 15px;
            padding: 30px; width: 100%; max-width: 600px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(10px);
        }
        h2 { text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        
        .history-item {
            background: #111; border-left: 4px solid #333; border-radius: 8px;
            padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; transition: 0.3s;
        }
        .history-item:hover { background: #1a1a1a; border-left-color: var(--gold); }
        .history-item.deposit { border-left-color: var(--success); }
        .history-item.withdraw { border-left-color: var(--pending); }
        
        .details h4 { margin: 0 0 5px 0; font-size: 16px; color: #fff; }
        .details p { margin: 0; font-size: 12px; color: #888; }
        .amount-box { text-align: right; }
        .amount-box h4 { margin: 0 0 5px 0; font-size: 18px; }
        .amount-box .status { font-size: 12px; font-weight: bold; padding: 3px 8px; border-radius: 4px; }
        
        .status.success { background: rgba(76, 175, 80, 0.2); color: var(--success); }
        .status.pending { background: rgba(255, 152, 0, 0.2); color: var(--pending); }
        
        .empty-state { text-align: center; color: #888; font-style: italic; padding: 20px; }
    body {
        background-color: #0b0e14; /* Game wala dark background */
        color: white;
        font-family: 'Poppins', sans-serif;
    }
    .container {
        background: #151924; /* Panel wala background */
        padding: 20px;
        border-radius: 15px;
        border: 1px solid #2a2e38;
        max-width: 500px;
        margin: 50px auto;
    }
    </style>
</head>
<body>

    <nav>
        <a href="/game.html">🔙 Play Mines</a>
        <a href="/wallet.html">💳 Wallet</a>
    </nav>

    <div class="history-container">
        <h2>Transaction History</h2>
        
        <div id="transaction-list">
            <div class="empty-state">Loading your history...</div>
        </div>
    </div>

<script>
    const currentUser = localStorage.getItem('currentUser');

    async function loadHistory() {
        if (!currentUser) {
            window.location.href = '/index.html';
            return;
        }

        try {
            const res = await fetch('/api/user/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUser })
            });
            
            const data = await res.json();
            const listContainer = document.getElementById('transaction-list');

            if (data.success && data.history && data.history.length > 0) {
                // Reverse isliye taaki naye transactions upar dikhein
                const sortedHistory = data.history.reverse(); 

                listContainer.innerHTML = sortedHistory.map(tx => {
                    const typeClass = tx.type ? tx.type.toLowerCase().replace(" ", "-") : "other";
                    const statusClass = tx.status ? tx.status.toLowerCase() : "pending";
                    
                    // Logic: Kaunse transactions Green honge?
                    const isPositive = ['Win', 'Deposit', 'Referral Bonus', 'Bonus'].includes(tx.type);
                    const color = isPositive ? '#00e701' : '#ff4444';
                    const symbol = isPositive ? '+' : '-';

                    return `
                        <div class="history-item ${typeClass}" style="border-left: 4px solid ${color}; background: #1a1f29; margin-bottom: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
                            <div class="details">
                                <h4 style="margin: 0; color: #fff; font-size: 16px;">${tx.type}</h4>
                                <p style="margin: 5px 0; color: #8c96a5; font-size: 12px;">${tx.date}</p>
                                ${tx.utr ? `<p style="font-size:10px; color: #555;">UTR: ${tx.utr}</p>` : ''}
                                ${tx.upiId ? `<p style="font-size:10px; color: #555;">UPI: ${tx.upiId}</p>` : ''}
                                ${tx.note ? `<p style="font-size:10px; color: #e6c27a;">${tx.note}</p>` : ''}
                            </div>
                            <div class="amount-box" style="text-align: right;">
                                <h4 style="margin: 0; color: ${color}; font-size: 18px;">
                                    ${symbol}₹${tx.amount}
                                </h4>
                                <span class="status ${statusClass}" style="font-size: 10px; padding: 2px 8px; border-radius: 4px; background: ${statusClass === 'success' ? '#00e70122' : '#ff444422'}; color: ${color};">
                                    ${tx.status}
                                </span>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                listContainer.innerHTML = '<div class="empty-state" style="text-align:center; padding:50px; color:#8c96a5;">Koi transaction nahi mila! 😎</div>';
            }
        } catch (e) {
            console.error(e);
            document.getElementById('transaction-list').innerHTML = '<div class="empty-state" style="text-align:center; padding:50px; color:red;">Server connection failed!</div>';
        }
    }

    window.onload = loadHistory;
</script>
</body>
</html>
