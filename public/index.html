<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login & Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.85);
            --text-light: #f5f5f5;
        }
        body {
            font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: var(--text-light);
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        .auth-container {
            background: var(--panel-bg); border: 1px solid #333; border-radius: 15px;
            padding: 40px; width: 100%; max-width: 350px; text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(15px); position: relative; overflow: hidden;
        }
        .auth-container::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate 4s linear infinite; z-index: -1;
        }
        .auth-container::after {
            content: ''; position: absolute; inset: 2px; background: var(--panel-bg);
            border-radius: 15px; z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .input-group input {
            width: 100%; padding: 12px; background: #111; border: 1px solid #444;
            color: white; border-radius: 5px; font-family: 'Poppins'; box-sizing: border-box;
            transition: 0.3s;
        }
        .input-group input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        
        button {
            width: 100%; padding: 15px; background: linear-gradient(90deg, #b5852a, #D4AF37);
            color: #000; font-weight: bold; font-size: 16px; border: none; border-radius: 5px;
            cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        button:hover { box-shadow: 0 0 15px var(--gold); transform: translateY(-2px); }
        
        .toggle-text { margin-top: 20px; font-size: 13px; color: #888; cursor: pointer; transition: 0.3s; }
        .toggle-text:hover { color: var(--gold); }
        
        .form-box { display: none; }
        .form-box.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="auth-container">
    <div id="login-form" class="form-box active">
        <h2>Login</h2>
        <div class="input-group">
            <label>Mobile No.</label>
            <input type="tel" id="login-phone" placeholder="Enter Mobile No." required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="login-pass" placeholder="Enter password" required>
        </div>
        <button type="button" onclick="login()" style="touch-action: manipulation;">Login</button>
        <div class="toggle-text" onclick="showRegister()">Don't have an account? Sign Up</div>
    </div>

    <div id="register-form" class="form-box">
        <h2>Create Account</h2>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="Enter your name" required>
        </div>
        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="reg-phone" placeholder="10-digit mobile number" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="reg-pass" placeholder="Create a password" required>
        </div>
        <button type="button" onclick="register()" style="touch-action: manipulation;">Sign Up</button>
        <div class="toggle-text" onclick="showLogin()">Already Created Account? Login here</div>
    </div>
</div>

<script>
    // Referral Tracking
    const urlParams = new URLSearchParams(window.location.search);
    const refCodeFromURL = urlParams.get('ref');
    if (refCodeFromURL) {
        localStorage.setItem('tempRef', refCodeFromURL);
    }

    // Toggle Functions (FIXED)
    function showRegister() {
        document.getElementById('login-form').classList.remove('active');
        document.getElementById('register-form').classList.add('active');
    }
    function showLogin() {
        document.getElementById('login-form').classList.add('active');
        document.getElementById('register-form').classList.remove('active');
    }

    // Login Function (FIXED IDs)
    async function login() {
        const phone = document.getElementById('login-phone').value;
        const password = document.getElementById('login-pass').value;

        if(!phone || !password) return alert("Details bharo bhai!");

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, password })
            });

            const data = await res.json();
            if (data.success) {
                localStorage.setItem('currentUser', data.userId);
                window.location.href = '/game.html';
            } else {
                alert(data.message);
            }
        } catch (e) {
            alert("Server connection failed!");
        }
    }

    // Register Function (Same as before but fixed toggle)
    async function register() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const password = document.getElementById('reg-pass').value;
        const savedRef = localStorage.getItem('tempRef');

        if (!name || !phone || !password) return alert("Saari details bharo!");

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, password, refCode: savedRef })
            });

            const data = await res.json();
            if (data.success) {
                alert("🎉 Success! Login karein.");
                localStorage.removeItem('tempRef');
                showLogin();
            } else {
                alert(data.message);
            }
        } catch (e) {
            alert("Error connecting to server!");
        }
    }
</script>
</body>
</html>
