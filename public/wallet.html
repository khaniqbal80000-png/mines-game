<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines Wallet | Deposit & Withdraw</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.8);
            --text-light: #f5f5f5;
        }
        body {
            font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: var(--text-light);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .wallet-container {
            background: var(--panel-bg); border: 1px solid #333; border-radius: 15px;
            padding: 30px; width: 100%; max-width: 450px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(10px);
        }
        h2 { text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .balance-box {
            text-align: center; background: linear-gradient(135deg, #1a1a1a, #000);
            padding: 20px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 20px;
        }
        .balance-box h3 { margin: 0; font-size: 32px; color: var(--gold); }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-bottom: 2px solid #333; font-weight: 600; transition: 0.3s; }
        .tab.active { border-bottom: 2px solid var(--gold); color: var(--gold); }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .qr-box { text-align: center; margin: 15px 0; padding: 10px; background: #fff; border-radius: 10px; display: inline-block; width: 150px; }
        .qr-box img { width: 100%; height: auto; }
        input {
            width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444;
            color: white; border-radius: 5px; font-family: 'Poppins'; box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--gold); }
        button {
            width: 100%; padding: 15px; background: linear-gradient(90deg, #b5852a, #D4AF37);
            color: #000; font-weight: bold; font-size: 16px; border: none; border-radius: 5px;
            cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        button:hover { box-shadow: 0 0 15px var(--gold); }
        .bonus-text { font-size: 12px; color: #aaa; text-align: center; }
        nav { text-align: center; margin-bottom: 20px; }
        nav a { color: var(--gold); text-decoration: none; margin: 0 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div>
        <nav>
            <a href="/game.html">🎮 Play Mines</a>
            <a href="/history.html">📜 History</a>
        </nav>

        <div class="wallet-container">
            <h2>Wallet</h2>
            
            <div class="balance-box">
                <p style="margin: 0; font-size: 14px; color: #aaa;">Available Balance</p>
                <h3>₹<span id="display-balance">0.00</span></h3>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('deposit')">Deposit</div>
                <div class="tab" onclick="switchTab('withdraw')">Withdraw</div>
            </div>

            <div id="deposit-sec" class="form-section active">
                <div style="text-align: center;">
                    <p style="margin:5px 0;">Scan to Pay</p>
                    <div class="qr-box">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=7689042786@fam&pn=SohelAkhtar" alt="UPI QR">
                    </div>
                    <p style="color: var(--gold); font-weight: bold; margin-top: 0;">UPI: 7689042786@fam</p>
                </div>
                
                <input type="number" id="dep-amount" placeholder="Amount (Min ₹100)" required>
                <input type="text" id="dep-utr" placeholder="Enter 12-Digit UTR Number" required>
                <p class="bonus-text">✨ Get ₹10 Bonus on every ₹100 deposit!</p>
                <button onclick="handleDeposit()">Deposit</button>
            </div>

            <div id="withdraw-sec" class="form-section">
                <p style="color: #aaa; text-align: center; font-size: 14px;">Instant UPI Withdrawals</p>
                <input type="text" id="with-upi" placeholder="Your UPI ID (e.g. name@paytm)" required>
                <input type="number" id="with-amount" placeholder="Amount (Min ₹200)" required>
                <button onclick="handleWithdraw()">Withdraw</button>
            </div>
        </div>
    </div>

  <script>
        // Check karna ki user login hai ya nahi
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            alert("Aapko pehle Login karna hoga!");
            window.location.href = '/index.html';
        }

        async function fetchBalance() {
            // Balance laane ke liye bhi user ki ID bhejni hogi
            const res = await fetch('/api/user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUser })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('display-balance').innerText = data.balance.toFixed(2);
            }
        }
        fetchBalance();

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            if(tab === 'deposit') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('deposit-sec').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('withdraw-sec').classList.add('active');
            }
        }

        async function handleDeposit() {
            const amount = document.getElementById('dep-amount').value;
            const utr = document.getElementById('dep-utr').value;

            if(!amount || !utr || utr.length < 12) return alert("Enter valid amount and 12-digit UTR.");

            const res = await fetch('/api/deposit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Yahan hum currentUser (Phone number) bhej rahe hain
                body: JSON.stringify({ amount: amount, utr: utr, userId: currentUser })
            });
            const data = await res.json();
            alert(data.message);
            if(data.success) {
                document.getElementById('dep-amount').value = '';
                document.getElementById('dep-utr').value = '';
                fetchBalance();
            }
        }

        async function handleWithdraw() {
            const amount = document.getElementById('with-amount').value;
            const upiId = document.getElementById('with-upi').value;

            if(!amount || !upiId) return alert("Enter valid amount and UPI ID.");

            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Yahan bhi currentUser bhej rahe hain
                body: JSON.stringify({ amount: amount, upiId: upiId, userId: currentUser })
            });
            const data = await res.json();
            alert(data.message);
            if(data.success) {
                document.getElementById('with-amount').value = '';
                document.getElementById('with-upi').value = '';
                fetchBalance();
            }
        }
    </script>
</body>
</html>
