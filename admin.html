<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Admin Panel - Mines Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0e14; color: white; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: #00e701; text-align: center; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,231,1,0.3); }
        
        .stats-bar { display: flex; justify-content: space-around; background: #1a1f2c; padding: 15px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #2a2e38; }
        .stat-item { text-align: center; }
        .stat-item h2 { margin: 0; color: #00e701; }
        .stat-item p { margin: 0; font-size: 12px; color: #8c96a5; }

        .card { 
            background: #151924; 
            border: 1px solid #2a2e38; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.3s;
        }
        .card:hover { border-color: #00e701; transform: translateY(-2px); }
        
        .details h3 { margin: 0 0 5px; color: #e6c27a; font-size: 18px; }
        .details p { margin: 2px 0; color: #8c96a5; font-size: 13px; }
        .user-tag { background: #2a2e38; padding: 2px 8px; border-radius: 4px; color: #00e701; font-weight: bold; }
        
        .amount-section { text-align: right; margin-right: 20px; min-width: 100px; }
        .amount { font-size: 22px; font-weight: 800; }
        .dep-color { color: #00e701; }
        .wth-color { color: #ff2a2a; }

        .actions { display: flex; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 14px; }
        .btn-approve { background: #00e701; color: black; }
        .btn-reject { background: #ff2a2a; color: white; }
        .btn:active { transform: scale(0.95); }

        .empty { text-align: center; color: #8c96a5; margin-top: 50px; font-size: 18px; padding: 40px; background: #151924; border-radius: 10px; border: 1px dashed #2a2e38; }
        
        /* Loading Spinner */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00e701; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>👑 Admin Control Room</h1>
        
        <div class="stats-bar">
            <div class="stat-item">
                <h2 id="total-pending">0</h2>
                <p>Pending Requests</p>
            </div>
            <button class="btn" style="background: #2a2e38; color: white;" onclick="loadPendingTxns()">🔄 Refresh List</button>
        </div>

        <div id="txn-list">
            <div class="loader"></div>
            <p style="text-align: center;">Fetching database records...</p>
        </div>
    </div>

    <script>
        // 1. Database se Pending Requests lana
        async function loadPendingTxns() {
            const listContainer = document.getElementById('txn-list');
            
            try {
                const res = await fetch('/api/admin/transactions');
                const data = await res.json();
                
                if (!data.success) {
                    listContainer.innerHTML = `<div class="empty">Error: ${data.message}</div>`;
                    return;
                }

                document.getElementById('total-pending').innerText = data.pendingTxns.length;
                listContainer.innerHTML = '';

                if (data.pendingTxns.length === 0) {
                    listContainer.innerHTML = '<div class="empty">🎉 All clear! No pending requests.</div>';
                    return;
                }

                // Har request ke liye card banana
                data.pendingTxns.forEach(txn => {
                    const isDep = txn.type === 'Deposit';
                    const colorClass = isDep ? 'dep-color' : 'wth-color';
                    const sign = isDep ? '+' : '-';
                    const displayId = isDep ? `UTR: ${txn.id}` : `UPI: ${txn.upi}`;

                    listContainer.innerHTML += `
                        <div class="card">
                            <div class="details">
                                <h3>${txn.type} <span class="user-tag">${txn.userPhone}</span></h3>
                                <p>${displayId}</p>
                                <p>Date: ${txn.date}</p>
                            </div>
                            <div class="amount-section">
                                <div class="amount ${colorClass}">${sign}₹${txn.amount}</div>
                                <p style="font-size:10px; margin:0;">+ ₹${txn.bonus || 0} Bonus</p>
                            </div>
                            <div class="actions">
                                <button class="btn btn-approve" onclick="takeAction('${txn.id}', 'Approve', '${txn.userPhone}')">APPROVE</button>
                                <button class="btn btn-reject" onclick="takeAction('${txn.id}', 'Reject', '${txn.userPhone}')">REJECT</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                listContainer.innerHTML = `<div class="empty">Connection Failed. Make sure server is running!</div>`;
            }
        }

        // 2. Approve ya Reject action lena
        async function takeAction(txnId, action, userPhone) {
            const confirmMsg = `Are you sure you want to ${action} this transaction for user ${userPhone}?`;
            if (!confirm(confirmMsg)) return;

            try {
                const res = await fetch('/api/admin/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        txnId: txnId, 
                        action: action, 
                        userPhone: userPhone // Yeh server ko batayega kis user ka balance update karna hai
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert(`✅ Done: Transaction ${action} successfully!`);
                    loadPendingTxns(); // List update karo
                } else {
                    alert(`❌ Error: ${data.message}`);
                }
            } catch (err) {
                alert("Server connection error!");
            }
        }

        // Page load hote hi data dikhao
        loadPendingTxns();
        
        // Auto-refresh har 30 second me
        setInterval(loadPendingTxns, 30000);
    </script>
</body>
</html>
